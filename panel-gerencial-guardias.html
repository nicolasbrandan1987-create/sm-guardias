<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM Guardias — Panel Gerencial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060b16;
    --surface: #0e1623;
    --surface2: #151f2e;
    --surface3: #1c2940;
    --border: rgba(255,255,255,0.06);
    --accent: #00c2a8;
    --accent2: #0077ff;
    --warn: #f59e0b;
    --danger: #ef4444;
    --success: #22c55e;
    --text: #e2e8f0;
    --muted: #4a5568;
    --sm-red: #cc0000;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* TOP BAR */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-brand {
    display: flex; align-items: center; gap: 10px;
  }
  .brand-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--sm-red);
    box-shadow: 0 0 8px var(--sm-red);
  }
  .brand-text { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
  .brand-sub { font-size: 11px; color: var(--muted); margin-left: 4px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .mes-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }
  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    background: var(--surface);
  }
  .tab {
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* CONTENT */
  .content { padding: 24px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* KPI ROW */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  @media(max-width:900px) { .kpi-row { grid-template-columns: repeat(3,1fr); } }
  @media(max-width:600px) { .kpi-row { grid-template-columns: repeat(2,1fr); } }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    position: relative;
    overflow: hidden;
  }
  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .kpi-value {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
  }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* RANKING TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .table-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .table-title { font-size: 13px; font-weight: 600; }
  .filter-wrap { display: flex; gap: 8px; }
  select.filter {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 12px;
    padding: 6px 10px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    appearance: none;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 10px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 12px 16px; font-size: 13px; }
  .rank-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    width: 32px;
  }
  .rank-1 .rank-num { color: #ffd700; font-weight: 700; }
  .rank-2 .rank-num { color: #c0c0c0; }
  .rank-3 .rank-num { color: #cd7f32; }
  .asesor-name { font-weight: 600; }
  .asesor-clinica { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* SCORE PILL */
  .score-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    min-width: 60px;
    justify-content: center;
  }
  .score-verde { background: rgba(34,197,94,0.1); color: #22c55e; }
  .score-amarillo { background: rgba(245,158,11,0.1); color: #f59e0b; }
  .score-rojo { background: rgba(239,68,68,0.1); color: #ef4444; }

  /* SCORE BAR */
  .score-bar-wrap { width: 80px; }
  .score-bar-bg { height: 4px; background: var(--surface3); border-radius: 2px; }
  .score-bar-fill { height: 4px; border-radius: 2px; transition: width 0.8s ease; }

  /* CLÍNICAS GRID */
  .clinicas-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  @media(max-width:700px) { .clinicas-grid { grid-template-columns: repeat(2,1fr); } }
  .clinica-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
  }
  .clinica-icon { font-size: 24px; margin-bottom: 8px; }
  .clinica-name { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
  .clinica-stat { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .clinica-stat-label { font-size: 11px; color: var(--muted); }
  .clinica-stat-val { font-size: 11px; font-family: 'DM Mono', monospace; }

  /* ALERTA */
  .alerta-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .alerta-icon { font-size: 16px; }
  .alerta-text { font-size: 13px; }
  .alerta-score { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--danger); margin-left: auto; }

  .loader-wrap { text-align: center; padding: 60px; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

  .num { font-family: 'DM Mono', monospace; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-dot"></div>
    <span class="brand-text">Guardias Clínicas</span>
    <span class="brand-sub">· Swiss Medical VIDA</span>
  </div>
  <div class="topbar-right">
    <div class="mes-badge" id="mesBadge">—</div>
    <button class="refresh-btn" onclick="cargarDatos()">↻ Actualizar</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('ranking',this)">📊 Ranking</div>
  <div class="tab" onclick="showTab('clinicas',this)">🏥 Por Clínica</div>
  <div class="tab" onclick="showTab('alertas',this)">⚠️ Alertas</div>
</div>

<div class="content">

  <!-- KPIs -->
  <div class="kpi-row" id="kpiRow">
    <div class="kpi" style="border-top-color:var(--accent)">
      <div class="kpi-label">Asesores activos</div>
      <div class="kpi-value" id="kpiAsesores" style="color:var(--accent)">—</div>
      <div class="kpi-sub">este mes</div>
    </div>
    <div class="kpi" style="border-top-color:var(--accent2)">
      <div class="kpi-label">Total guardias</div>
      <div class="kpi-value" id="kpiGuardias" style="color:var(--accent2)">—</div>
    </div>
    <div class="kpi" style="border-top-color:var(--warn)">
      <div class="kpi-label">Contactos</div>
      <div class="kpi-value" id="kpiContactos" style="color:var(--warn)">—</div>
    </div>
    <div class="kpi" style="border-top-color:#a78bfa">
      <div class="kpi-label">Leads</div>
      <div class="kpi-value" id="kpiLeads" style="color:#a78bfa">—</div>
    </div>
    <div class="kpi" style="border-top-color:var(--success)">
      <div class="kpi-label">Pólizas</div>
      <div class="kpi-value" id="kpiPolizas" style="color:var(--success)">—</div>
    </div>
  </div>

  <!-- TAB RANKING -->
  <div class="tab-panel active" id="tab-ranking">
    <div class="table-wrap" id="rankingWrap">
      <div class="loader-wrap"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- TAB CLÍNICAS -->
  <div class="tab-panel" id="tab-clinicas">
    <div class="clinicas-grid" id="clinicasGrid">
      <div class="loader-wrap"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- TAB ALERTAS -->
  <div class="tab-panel" id="tab-alertas">
    <div class="section-title" style="margin-bottom:12px">Asesores con score bajo</div>
    <div id="alertasWrap">
      <div class="loader-wrap"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQCmKWH912-1le5hBTIewUQmvJapaqpphVV6CsHkdNICa3WnBjDs1p_OFmrlvGOCONKA/exec";
const CLINICA_ICONS = {"Los Arcos":"🏥","Cymsa":"🏨","Agote":"🏦","Zabala":"🏢","Nordelta":"🌿","Olivos":"🌳"};

let cbCount = 0;
function jsonp(url, name, cb) {
  const n = name+'_'+(cbCount++);
  window[n] = d => { cb(d); delete window[n]; };
  const s = document.createElement('script');
  s.src = url+'&callback='+n;
  s.onerror = () => cb({ok:false});
  document.head.appendChild(s);
  setTimeout(()=>s.remove(),12000);
}

function showTab(id, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

function cargarDatos() {
  jsonp(APPS_SCRIPT_URL+'?action=getDashboardGerencial','cb_ger', data => {
    if (!data.ok) return;
    renderDashboard(data);
  });
}

function renderDashboard(data) {
  const ranking = data.ranking || [];
  const porClinica = data.porClinica || {};
  const mes = data.mes || '—';

  // Mes badge
  const [y, m] = mes.split('-');
  const meses = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('mesBadge').textContent = `${meses[parseInt(m)]} ${y}`;

  // KPIs
  const totGuardias = ranking.reduce((a,r)=>a+r.guardias,0);
  const totContactos = ranking.reduce((a,r)=>a+r.contactos,0);
  const totLeads = ranking.reduce((a,r)=>a+r.leads,0);
  const totPolizas = ranking.reduce((a,r)=>a+r.polizas,0);

  document.getElementById('kpiAsesores').textContent = ranking.length;
  document.getElementById('kpiGuardias').textContent = totGuardias;
  document.getElementById('kpiContactos').textContent = totContactos;
  document.getElementById('kpiLeads').textContent = totLeads;
  document.getElementById('kpiPolizas').textContent = totPolizas;

  // ── RANKING ──────────────────────────────────────────────
  let tableHtml = `
  <div class="table-header">
    <span class="table-title">Ranking de asesores · ${mes}</span>
    <div class="filter-wrap">
      <select class="filter" id="filterJefe" onchange="filtrarRanking()">
        <option value="">Todos los jefes</option>
      </select>
      <select class="filter" id="filterClinica" onchange="filtrarRanking()">
        <option value="">Todas las clínicas</option>
      </select>
    </div>
  </div>
  <div style="overflow-x:auto">
  <table id="rankingTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Asesor</th>
        <th>Score</th>
        <th>Guardias</th>
        <th>Contactos</th>
        <th>Leads</th>
        <th>Pólizas</th>
        <th>Jefe</th>
      </tr>
    </thead>
    <tbody id="rankingBody">
    </tbody>
  </table>
  </div>`;
  document.getElementById('rankingWrap').innerHTML = tableHtml;

  // Populate filters
  const jefes = [...new Set(ranking.map(r=>r.jefe).filter(Boolean))];
  const clinicas = [...new Set(ranking.map(r=>r.clinica).filter(Boolean))];
  const selJefe = document.getElementById('filterJefe');
  const selClin = document.getElementById('filterClinica');
  jefes.forEach(j => { selJefe.innerHTML += `<option value="${j}">${j}</option>`; });
  clinicas.forEach(c => { selClin.innerHTML += `<option value="${c}">${c}</option>`; });

  window._rankingData = ranking;
  filtrarRanking();

  // ── CLÍNICAS ─────────────────────────────────────────────
  let clinGrid = '';
  ['Los Arcos','Cymsa','Agote','Zabala','Nordelta','Olivos'].forEach(c => {
    const d = porClinica[c] || { asesores:0, guardias:0, contactos:0, leads:0, polizas:0 };
    clinGrid += `
    <div class="clinica-card">
      <div class="clinica-icon">${CLINICA_ICONS[c]||'🏥'}</div>
      <div class="clinica-name">${c}</div>
      <div class="clinica-stat"><span class="clinica-stat-label">Asesores</span><span class="clinica-stat-val num">${d.asesores}</span></div>
      <div class="clinica-stat"><span class="clinica-stat-label">Guardias</span><span class="clinica-stat-val num">${d.guardias}</span></div>
      <div class="clinica-stat"><span class="clinica-stat-label">Contactos</span><span class="clinica-stat-val num">${d.contactos}</span></div>
      <div class="clinica-stat"><span class="clinica-stat-label">Leads</span><span class="clinica-stat-val num">${d.leads}</span></div>
      <div class="clinica-stat"><span class="clinica-stat-label">Pólizas</span><span class="clinica-stat-val num">${d.polizas}</span></div>
    </div>`;
  });
  document.getElementById('clinicasGrid').innerHTML = clinGrid;

  // ── ALERTAS ───────────────────────────────────────────────
  const bajos = ranking.filter(r => r.score < 50);
  const medios = ranking.filter(r => r.score >= 50 && r.score < 75);
  let alertHtml = '';
  if (bajos.length === 0 && medios.length === 0) {
    alertHtml = '<div style="text-align:center;color:var(--success);padding:40px;font-size:14px;">✓ Todos los asesores en niveles aceptables</div>';
  } else {
    if (bajos.length > 0) {
      alertHtml += `<div class="section-title" style="color:var(--danger)">🔴 Score crítico (< 50) — ${bajos.length} asesores</div>`;
      bajos.forEach(a => {
        alertHtml += `<div class="alerta-row">
          <span class="alerta-icon">⚠️</span>
          <div class="alerta-text">
            <strong>${a.nombre}</strong><br>
            <span style="font-size:11px;color:var(--muted)">${a.clinica} · ${a.jefe||'—'}</span>
          </div>
          <span class="alerta-score">${a.score} pts</span>
        </div>`;
      });
    }
    if (medios.length > 0) {
      alertHtml += `<div class="section-title" style="margin-top:20px;color:var(--warn)">🟡 En desarrollo (50–74) — ${medios.length} asesores</div>`;
      medios.forEach(a => {
        alertHtml += `<div class="alerta-row" style="background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2)">
          <span class="alerta-icon">📋</span>
          <div class="alerta-text">
            <strong>${a.nombre}</strong><br>
            <span style="font-size:11px;color:var(--muted)">${a.clinica} · ${a.jefe||'—'}</span>
          </div>
          <span class="alerta-score" style="color:var(--warn)">${a.score} pts</span>
        </div>`;
      });
    }
  }
  document.getElementById('alertasWrap').innerHTML = alertHtml;
}

function filtrarRanking() {
  const jefe = document.getElementById('filterJefe')?.value || '';
  const clinica = document.getElementById('filterClinica')?.value || '';
  const data = window._rankingData || [];

  const filtered = data.filter(r =>
    (!jefe || r.jefe === jefe) &&
    (!clinica || r.clinica === clinica)
  );

  const tbody = document.getElementById('rankingBody');
  if (!tbody) return;

  tbody.innerHTML = filtered.map((r, i) => {
    const scoreClass = r.score >= 75 ? 'score-verde' : r.score >= 50 ? 'score-amarillo' : 'score-rojo';
    const barColor = r.score >= 75 ? '#22c55e' : r.score >= 50 ? '#f59e0b' : '#ef4444';
    return `<tr class="rank-${i+1}">
      <td class="rank-num">${i+1}</td>
      <td>
        <div class="asesor-name">${r.nombre}</div>
        <div class="asesor-clinica">${CLINICA_ICONS[r.clinica]||''} ${r.clinica||'—'}</div>
      </td>
      <td>
        <span class="score-pill ${scoreClass}">${r.score}</span>
        <div class="score-bar-wrap" style="margin-top:5px">
          <div class="score-bar-bg"><div class="score-bar-fill" style="width:${r.score}%;background:${barColor}"></div></div>
        </div>
      </td>
      <td class="num">${r.guardias}</td>
      <td class="num">${r.contactos}</td>
      <td class="num">${r.leads}</td>
      <td class="num">${r.polizas}</td>
      <td style="font-size:12px;color:var(--muted)">${r.jefe||'—'}</td>
    </tr>`;
  }).join('');
}

// Init
cargarDatos();
</script>
</body>
</html>
