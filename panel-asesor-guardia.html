<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM Guardias — Mi Panel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.07);
    --accent: #00c2a8;
    --accent2: #0077ff;
    --warn: #f59e0b;
    --danger: #ef4444;
    --success: #22c55e;
    --text: #f1f5f9;
    --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
  }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .avatar {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #000; flex-shrink: 0;
  }
  .header-name { font-size: 17px; font-weight: 700; }
  .header-clinica { font-size: 13px; color: var(--muted); margin-top: 2px; }

  select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    appearance: none;
  }
  select:focus { border-color: var(--accent); }

  .main { padding: 16px; }

  /* SCORE RING */
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 20px;
    margin-bottom: 12px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .score-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(0,194,168,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .score-ring-wrap { position: relative; display: inline-block; margin-bottom: 12px; }
  .score-svg { transform: rotate(-90deg); }
  .score-value {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'DM Mono', monospace;
    font-size: 32px;
    font-weight: 500;
    color: var(--accent);
  }
  .score-label { font-size: 13px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .score-nivel {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .nivel-verde { background: rgba(34,197,94,0.15); color: var(--success); }
  .nivel-amarillo { background: rgba(245,158,11,0.15); color: var(--warn); }
  .nivel-rojo { background: rgba(239,68,68,0.15); color: var(--danger); }

  /* MÉTRICAS */
  .metricas-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .metrica-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .metrica-icon { font-size: 22px; margin-bottom: 8px; }
  .metrica-value {
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }
  .metrica-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .metrica-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    border-radius: 0 0 16px 16px;
  }

  /* HISTORIAL */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 2px;
  }
  .registro-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
  }
  .reg-fecha {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.4;
  }
  .reg-fecha strong { display: block; font-size: 16px; color: var(--text); }
  .reg-info { }
  .reg-clinica { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .reg-duracion { font-size: 12px; color: var(--muted); }
  .reg-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .chip {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
  }
  .chip-c { background: rgba(0,194,168,0.1); color: var(--accent); }
  .chip-l { background: rgba(0,119,255,0.1); color: var(--accent2); }
  .chip-p { background: rgba(34,197,94,0.1); color: var(--success); }
  .reg-estado .dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block;
  }
  .dot-activo { background: var(--accent); animation: pulse 1.5s infinite; }
  .dot-cerrado { background: var(--muted); }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }

  .empty { text-align: center; color: var(--muted); padding: 32px; font-size: 14px; }
  .loader-wrap { text-align: center; padding: 40px; }
  .spinner {
    display: inline-block; width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="avatar" id="avatarEl">?</div>
    <div>
      <div class="header-name" id="nombreEl">Seleccioná tu nombre</div>
      <div class="header-clinica" id="clinicaEl">—</div>
    </div>
  </div>
  <select id="selectAsesor" onchange="cargarPanel()">
    <option value="">Seleccioná tu nombre...</option>
  </select>
</div>

<div class="main" id="mainContent">
  <div style="text-align:center; padding:60px 20px; color:var(--muted); font-size:14px;">
    Seleccioná tu nombre para ver tu panel
  </div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQCmKWH912-1le5hBTIewUQmvJapaqpphVV6CsHkdNICa3WnBjDs1p_OFmrlvGOCONKA/exec";

let cbCount = 0;
function jsonp(url, name, cb) {
  const n = name + '_' + (cbCount++);
  window[n] = d => { cb(d); delete window[n]; };
  const s = document.createElement('script');
  s.src = url + '&callback=' + n;
  s.onerror = () => cb({ ok: false, error: 'Sin conexión' });
  document.head.appendChild(s);
  setTimeout(() => s.remove(), 10000);
}

// Load asesores
jsonp(APPS_SCRIPT_URL + "?action=getAsesores", "cb_load", data => {
  const sel = document.getElementById('selectAsesor');
  if (data.ok && data.asesores) {
    data.asesores.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.nombre;
      opt.dataset.clinica = a.clinica;
      opt.textContent = a.nombre;
      sel.appendChild(opt);
    });
  }
});

function cargarPanel() {
  const sel = document.getElementById('selectAsesor');
  const nombre = sel.value;
  if (!nombre) return;

  const opt = sel.options[sel.selectedIndex];
  const clinica = opt.dataset.clinica || '—';
  const inicial = nombre.charAt(0).toUpperCase();

  document.getElementById('avatarEl').textContent = inicial;
  document.getElementById('nombreEl').textContent = nombre;
  document.getElementById('clinicaEl').textContent = '📍 ' + clinica;

  document.getElementById('mainContent').innerHTML = `<div class="loader-wrap"><div class="spinner"></div></div>`;

  jsonp(`${APPS_SCRIPT_URL}?action=getMiActividad&asesor=${encodeURIComponent(nombre)}`, "cb_panel", data => {
    if (!data.ok) {
      document.getElementById('mainContent').innerHTML = `<div class="empty">No se pudo cargar la información.</div>`;
      return;
    }
    renderPanel(data);
  });
}

function renderPanel(data) {
  const r = data.resumen;
  const score = r.score || 0;
  const nivel = score >= 75 ? ['verde','EXCELENTE'] : score >= 50 ? ['amarillo','EN DESARROLLO'] : ['rojo','NECESITA MEJORA'];

  // Score ring
  const circum = 2 * Math.PI * 52;
  const dash = circum * (score / 100);

  // Métricas barras color
  const colors = { guardias: '#00c2a8', contactos: '#0077ff', leads: '#f59e0b', polizas: '#22c55e' };

  let html = `
  <div class="score-card">
    <div class="score-ring-wrap">
      <svg class="score-svg" width="130" height="130" viewBox="0 0 130 130">
        <circle cx="65" cy="65" r="52" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="10"/>
        <circle cx="65" cy="65" r="52" fill="none" stroke="#00c2a8" stroke-width="10"
          stroke-dasharray="${dash.toFixed(1)} ${circum.toFixed(1)}"
          stroke-linecap="round" style="transition:stroke-dasharray 1s ease"/>
      </svg>
      <div class="score-value">${score}</div>
    </div>
    <div class="score-label">Score del mes</div>
    <div class="score-nivel nivel-${nivel[0]}">${nivel[1]}</div>
  </div>

  <div class="metricas-grid">
    <div class="metrica-card">
      <div class="metrica-icon">📅</div>
      <div class="metrica-value" style="color:#00c2a8">${r.totalGuardias}</div>
      <div class="metrica-label">Guardias</div>
      <div class="metrica-bar" style="width:${Math.min(r.totalGuardias/20*100,100)}%; background:#00c2a8"></div>
    </div>
    <div class="metrica-card">
      <div class="metrica-icon">🤝</div>
      <div class="metrica-value" style="color:#0077ff">${r.totalContactos}</div>
      <div class="metrica-label">Contactos</div>
      <div class="metrica-bar" style="width:${Math.min(r.totalContactos/100*100,100)}%; background:#0077ff"></div>
    </div>
    <div class="metrica-card">
      <div class="metrica-icon">📋</div>
      <div class="metrica-value" style="color:#f59e0b">${r.totalLeads}</div>
      <div class="metrica-label">Leads</div>
      <div class="metrica-bar" style="width:${Math.min(r.totalLeads/40*100,100)}%; background:#f59e0b"></div>
    </div>
    <div class="metrica-card">
      <div class="metrica-icon">✅</div>
      <div class="metrica-value" style="color:#22c55e">${r.totalPolizas}</div>
      <div class="metrica-label">Pólizas</div>
      <div class="metrica-bar" style="width:${Math.min(r.totalPolizas/10*100,100)}%; background:#22c55e"></div>
    </div>
  </div>

  <div class="section-title">Últimas guardias</div>
  `;

  if (!data.registros || data.registros.length === 0) {
    html += `<div class="empty">Todavía no tenés guardias registradas este mes.</div>`;
  } else {
    data.registros.forEach(reg => {
      const fecha = reg.fecha ? reg.fecha.split('-') : ['—','—','—'];
      const durStr = reg.duracion ? `${reg.duracion} min` : 'En curso';
      html += `
      <div class="registro-item">
        <div class="reg-fecha">
          <strong>${fecha[2] || '—'}</strong>
          ${getMes(fecha[1])}
        </div>
        <div class="reg-info">
          <div class="reg-clinica">${reg.clinica || '—'}</div>
          <div class="reg-duracion">⏱ ${durStr}</div>
          <div class="reg-chips">
            ${reg.contactos > 0 ? `<span class="chip chip-c">${reg.contactos} cont.</span>` : ''}
            ${reg.leads > 0 ? `<span class="chip chip-l">${reg.leads} leads</span>` : ''}
            ${reg.polizas > 0 ? `<span class="chip chip-p">${reg.polizas} pólizas</span>` : ''}
          </div>
        </div>
        <div class="reg-estado">
          <span class="dot dot-${reg.estado}"></span>
        </div>
      </div>`;
    });
  }

  document.getElementById('mainContent').innerHTML = html;
}

function getMes(m) {
  const meses = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return meses[parseInt(m)] || '—';
}
</script>
</body>
</html>
