<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM Guardias — Mi Panel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0f1e;--surface:#111827;--surface2:#1a2235;--border:rgba(255,255,255,0.07);--accent:#00c2a8;--accent2:#0077ff;--warn:#f59e0b;--danger:#ef4444;--success:#22c55e;--text:#f1f5f9;--muted:#64748b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 16px;}
  .header-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .avatar{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#000;flex-shrink:0;}
  .header-name{font-size:17px;font-weight:700;}
  .header-sub{font-size:13px;color:var(--muted);margin-top:2px;}
  select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px;outline:none;appearance:none;}
  select:focus{border-color:var(--accent);}
  .main{padding:14px 14px 0;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;}
  .card-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

  /* SCORE + RANKING */
  .score-ranking{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .score-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center;}
  .score-num{font-family:'DM Mono',monospace;font-size:40px;font-weight:500;line-height:1;}
  .score-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
  .nivel{display:inline-block;margin-top:6px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;}
  .nivel-verde{background:rgba(34,197,94,.15);color:var(--success);}
  .nivel-amarillo{background:rgba(245,158,11,.15);color:var(--warn);}
  .nivel-rojo{background:rgba(239,68,68,.15);color:var(--danger);}
  .ranking-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ranking-pos{font-family:'DM Mono',monospace;font-size:44px;font-weight:500;color:var(--accent);line-height:1;}
  .ranking-de{font-size:13px;color:var(--muted);margin-top:4px;}
  .ranking-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}

  /* PRIMA */
  .prima-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .prima-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;}
  .prima-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;margin-bottom:2px;}
  .prima-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

  /* FUNNEL */
  .funnel{position:relative;margin-bottom:10px;}
  .funnel-bar{border-radius:10px;overflow:hidden;margin-bottom:6px;}
  .funnel-step{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .funnel-step-label{font-size:13px;color:var(--muted);width:90px;flex-shrink:0;}
  .funnel-step-bar-wrap{flex:1;height:28px;background:var(--surface2);border-radius:8px;overflow:hidden;margin:0 10px;}
  .funnel-step-bar{height:100%;border-radius:8px;display:flex;align-items:center;padding-left:10px;font-size:12px;font-weight:700;color:#000;transition:width 1s ease;}
  .funnel-step-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;width:28px;text-align:right;flex-shrink:0;}
  .conv-badge{text-align:center;padding:8px;background:var(--surface2);border-radius:10px;font-size:13px;}
  .conv-pct{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--accent);}

  /* OPERACIONES */
  .op-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
  .op-item:last-child{border-bottom:none;}
  .op-plan{font-size:13px;font-weight:600;margin-bottom:2px;}
  .op-cliente{font-size:11px;color:var(--muted);}
  .op-prima{font-family:'DM Mono',monospace;font-size:13px;margin-bottom:2px;text-align:right;}
  .op-estado{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700;display:inline-block;float:right;}
  .est-cotizado{background:rgba(245,158,11,.15);color:var(--warn);}
  .est-vendido{background:rgba(34,197,94,.15);color:var(--success);}
  .est-caido{background:rgba(239,68,68,.15);color:var(--danger);}

  /* MÉTRICAS */
  .metricas-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
  .met{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
  .met-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;line-height:1;margin-bottom:2px;}
  .met-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

  .spinner-wrap{text-align:center;padding:50px;color:var(--muted);}
  .spinner{display:inline-block;width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;color:var(--muted);padding:24px;font-size:13px;}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="avatar" id="avatarEl">?</div>
    <div><div class="header-name" id="nombreEl">Seleccioná tu nombre</div><div class="header-sub" id="clinicaEl">—</div></div>
  </div>
  <select id="selectAsesor" onchange="cargarPanel()"><option value="">Seleccioná tu nombre...</option></select>
</div>
<div class="main" id="mainContent">
  <div style="text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;">Seleccioná tu nombre para ver tu panel</div>
</div>

<script>
const URL_AS="https://script.google.com/macros/s/AKfycby5BTEKxqKRjZ4DvMLCdHAv-j-f9XdGztJ0WjSV8YvqX0QdLIBAMURR0TUziqMbt2Utag/exec";
let cbC=0;
function jsonp(url,name,cb){const n=name+'_'+(cbC++);window[n]=d=>{cb(d);delete window[n];};const s=document.createElement('script');s.src=url+'&callback='+n;s.onerror=()=>cb({ok:false});document.head.appendChild(s);setTimeout(()=>s.remove(),12000);}

jsonp(URL_AS+"?action=getAsesores","cb_load",data=>{
  const sel=document.getElementById('selectAsesor');
  if(data.ok&&data.asesores)data.asesores.forEach(a=>{const o=document.createElement('option');o.value=a.nombre;o.dataset.clinica=a.clinica;o.textContent=a.nombre;sel.appendChild(o);});
});

function cargarPanel(){
  const sel=document.getElementById('selectAsesor');
  const nombre=sel.value;if(!nombre)return;
  const clinica=sel.options[sel.selectedIndex].dataset.clinica||'—';
  document.getElementById('avatarEl').textContent=nombre.charAt(0).toUpperCase();
  document.getElementById('nombreEl').textContent=nombre;
  document.getElementById('clinicaEl').textContent='📍 '+clinica;
  document.getElementById('mainContent').innerHTML='<div class="spinner-wrap"><div class="spinner"></div></div>';

  let panelData=null, rankData=null;
  const tryRender=()=>{ if(panelData&&rankData) renderPanel(panelData,rankData); };

  jsonp(`${URL_AS}?action=getMiPanel&asesor=${encodeURIComponent(nombre)}`,"cb_panel",d=>{ panelData=d; tryRender(); });
  jsonp(`${URL_AS}?action=getRankingPosicion&asesor=${encodeURIComponent(nombre)}`,"cb_rank",d=>{ rankData=d; tryRender(); });
}

function renderPanel(data, rank){
  if(!data.ok){document.getElementById('mainContent').innerHTML='<div class="empty">Error cargando datos.</div>';return;}
  const r=data.resumen;
  const score=r.score||0;
  const nivel=score>=75?['verde','EXCELENTE']:score>=50?['amarillo','EN DESARROLLO']:['rojo','NECESITA MEJORA'];
  const pos=rank.ok?rank.posicion:'—';
  const total=rank.ok?rank.total:'—';
  const maxFunnel=Math.max(r.cotizados||0,1);

  let html=`
  <!-- SCORE + RANKING -->
  <div class="score-ranking">
    <div class="score-box">
      <div class="score-num" style="color:${score>=75?'var(--success)':score>=50?'var(--warn)':'var(--danger)'}">${score}</div>
      <div class="score-lbl">Score</div>
      <div class="nivel nivel-${nivel[0]}">${nivel[1]}</div>
    </div>
    <div class="ranking-box">
      <div class="ranking-pos">${pos}°</div>
      <div class="ranking-de">de ${total}</div>
      <div class="ranking-lbl">Ranking</div>
    </div>
  </div>

  <!-- PRIMA -->
  <div class="prima-row">
    <div class="prima-card">
      <div class="prima-val" style="color:var(--warn)">$${(r.primaCotizada||0).toLocaleString('es-AR')}</div>
      <div class="prima-lbl">Prima cotizada</div>
    </div>
    <div class="prima-card">
      <div class="prima-val" style="color:var(--success)">$${(r.primaVendida||0).toLocaleString('es-AR')}</div>
      <div class="prima-lbl">Prima vendida</div>
    </div>
  </div>

  <!-- FUNNEL -->
  <div class="card">
    <div class="card-label">Funnel de ventas</div>
    <div class="funnel-step">
      <div class="funnel-step-label">Contactos</div>
      <div class="funnel-step-bar-wrap"><div class="funnel-step-bar" style="width:100%;background:var(--accent2)">${r.contactos||0}</div></div>
      <div class="funnel-step-val" style="color:var(--accent2)">${r.contactos||0}</div>
    </div>
    <div class="funnel-step">
      <div class="funnel-step-label">Leads</div>
      <div class="funnel-step-bar-wrap"><div class="funnel-step-bar" style="width:${r.contactos>0?Math.round((r.leads||0)/r.contactos*100):0}%;background:var(--warn)">${r.leads||0}</div></div>
      <div class="funnel-step-val" style="color:var(--warn)">${r.leads||0}</div>
    </div>
    <div class="funnel-step">
      <div class="funnel-step-label">Cotizados</div>
      <div class="funnel-step-bar-wrap"><div class="funnel-step-bar" style="width:${r.contactos>0?Math.round((r.cotizados||0)/r.contactos*100):0}%;background:#a78bfa">${r.cotizados||0}</div></div>
      <div class="funnel-step-val" style="color:#a78bfa">${r.cotizados||0}</div>
    </div>
    <div class="funnel-step">
      <div class="funnel-step-label">Vendidos</div>
      <div class="funnel-step-bar-wrap"><div class="funnel-step-bar" style="width:${r.cotizados>0?Math.round((r.vendidos||0)/r.cotizados*100):0}%;background:var(--success)">${r.vendidos||0}</div></div>
      <div class="funnel-step-val" style="color:var(--success)">${r.vendidos||0}</div>
    </div>
    <div class="conv-badge" style="margin-top:8px">
      <div class="conv-pct">${r.conversion||0}%</div>
      <div style="font-size:11px;color:var(--muted)">tasa de conversión</div>
    </div>
  </div>

  <!-- MÉTRICAS ACTIVIDAD -->
  <div class="metricas-grid">
    <div class="met"><div class="met-val" style="color:var(--accent)">${r.guardias||0}</div><div class="met-lbl">Guardias</div></div>
    <div class="met"><div class="met-val" style="color:var(--accent2)">${r.contactos||0}</div><div class="met-lbl">Contactos</div></div>
    <div class="met"><div class="met-val" style="color:var(--danger)">${r.caidos||0}</div><div class="met-lbl">Caídos</div></div>
  </div>

  <!-- ÚLTIMAS OPERACIONES -->
  <div class="card">
    <div class="card-label">Últimas operaciones</div>`;

  if(!data.operaciones||data.operaciones.length===0){
    html+='<div class="empty">Sin operaciones registradas este mes.</div>';
  } else {
    data.operaciones.forEach(o=>{
      html+=`<div class="op-item">
        <div><div class="op-plan">${o.plan||'—'}</div><div class="op-cliente">${o.cliente||'—'} · <span style="font-family:'DM Mono',monospace;font-size:10px">${o.semana||''}</span></div></div>
        <div style="text-align:right"><div class="op-prima">$${(o.prima||0).toLocaleString('es-AR')}</div><span class="op-estado est-${o.estado}">${(o.estado||'').toUpperCase()}</span></div>
      </div>`;
    });
  }
  html+='</div>';
  document.getElementById('mainContent').innerHTML=html;
}
</script>
</body>
</html>
